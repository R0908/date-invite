<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Will You Go On A Date With Me?</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.js"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://nominatim.openstreetmap.org/reverse?format=json"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,Helvetica,sans-serif;
    background:linear-gradient(135deg,#ffd6e7,#fff0f6);
    overflow-x:hidden;
    min-height:100vh;
}

.screen{
    min-height:100vh;
    display:none;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.screen.active{
    display:flex;
}

.hero{
    font-size:120px;
    margin-bottom:20px;
}

h1{
    font-size:clamp(28px,4vw,48px);
    margin-bottom:25px;
    color:#222;
}

.buttons{
    display:flex;
    gap:20px;
    position:relative;
}

button{
    border:none;
    border-radius:14px;
    cursor:pointer;
    transition:.25s;
    font-weight:bold;
}

#yesBtn{
    background:#ff4d6d;
    color:white;
    padding:16px 40px;
    font-size:24px;
}

#noBtn{
    background:#d9d9d9;
    color:#222;
    padding:16px 40px;
    font-size:24px;
    position:relative;
}

#continueBtn,
#submitBtn,
#shareBtn{
    background:#ff4d6d;
    color:white;
    padding:14px 30px;
    font-size:18px;
    margin-top:20px;
}

.form{
    width:100%;
    max-width:500px;
}

.form label{
    display:block;
    text-align:left;
    margin-top:16px;
    margin-bottom:6px;
    font-weight:bold;
}

.form input,
.form select{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #ccc;
}

.success-emoji{
    font-size:110px;
    margin-bottom:15px;
}

.final-image{
    font-size:140px;
}

.language{
    position:fixed;
    top:15px;
    right:15px;
    z-index:1000;
}

.language select{
    padding:8px;
    border-radius:8px;
}

.confetti{
    position:fixed;
    width:10px;
    height:10px;
    pointer-events:none;
    animation:fall 3s linear forwards;
}

@keyframes fall{
    from{
        transform:translateY(-100px) rotate(0deg);
        opacity:1;
    }
    to{
        transform:translateY(120vh) rotate(720deg);
        opacity:0;
    }
}

.share-link{
    margin-top:15px;
    word-break:break-all;
    max-width:500px;
    color:#555;
    font-size:12px;
}

#map {
    width:100%;
    height:400px;
    border-radius:10px;
    margin-top:10px;
    margin-bottom:15px;
    border:2px solid #ff4d6d;
    z-index:10;
}

.map-info{
    background:#f0f0f0;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
    font-size:14px;
    color:#555;
}

.flatpickr-calendar {
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

.error-message {
    color: #ff4d6d;
    font-size: 14px;
    margin-top: 5px;
}

.leaflet-popup-content-wrapper {
    background: #ff4d6d;
    color: white;
    border-radius: 10px;
}
</style>
</head>
<body>

<div class="language">
    <select id="lang">
        <option value="en">English</option>
        <option value="es">Español</option>
        <option value="ru">Русский</option>
    </select>
</div>

<!-- Screen 1 -->
<div id="screen1" class="screen active">

    <div class="hero">😺</div>

    <h1 id="question">
        Will you go on a date with me?
    </h1>

    <div class="buttons">
        <button id="yesBtn">YES</button>
        <button id="noBtn">NO</button>
    </div>

</div>

<!-- Screen 2 -->
<div id="screen2" class="screen">

    <div class="success-emoji">🎉</div>

    <h1 id="acceptedText">
        Wait... You actually said YES?!
    </h1>

    <button id="continueBtn">
        Continue
    </button>

</div>

<!-- Screen 3 -->
<div id="screen3" class="screen">

    <h1 id="formTitle">
        Let's plan our date ❤️
    </h1>

    <div class="form">

        <label id="dateLabel">Choose date</label>
        <input type="date" id="dateInput">
        <div class="error-message" id="dateError"></div>

        <label id="placeLabel">Choose place</label>
        <div id="map"></div>
        <div class="map-info" id="mapInfo">Click on the map to select a location</div>
        <input type="hidden" id="latitude">
        <input type="hidden" id="longitude">
        <input type="hidden" id="placeName">

        <label id="cuisineLabel">Favorite cuisine</label>

        <select id="cuisineSelect">
            <option>Italian</option>
            <option>Japanese</option>
            <option>Spanish</option>
            <option>Mexican</option>
            <option>French</option>
        </select>

        <button id="submitBtn">
            Confirm
        </button>

    </div>

</div>

<!-- Screen 4 -->
<div id="screen4" class="screen">

    <div class="final-image">💐🍫</div>

    <h1 id="thanksText">
        Thank you ❤️
    </h1>

    <button id="shareBtn">
        Share with friends
    </button>

    <div class="share-link" id="shareLink"></div>

</div>

<script>

const translations = {

    en:{
        question:"Will you go on a date with me?",
        yes:"YES",
        no:"NO",
        accepted:"Wait... You actually said YES?!",
        continue:"Continue",
        plan:"Let's plan our date ❤️",
        date:"Choose date",
        place:"Choose place",
        cuisine:"Favorite cuisine",
        confirm:"Confirm",
        thanks:"Thank you ❤️",
        share:"Share with friends",
        dateError:"Please select a future date",
        selectLocation:"Click on the map to select a location",
        locationSelected:"Location: ",
        italian:"Italian",
        japanese:"Japanese",
        spanish:"Spanish",
        mexican:"Mexican",
        french:"French"
    },

    es:{
        question:"¿Quieres salir conmigo?",
        yes:"SÍ",
        no:"NO",
        accepted:"Espera... ¿De verdad dijiste SÍ?",
        continue:"Continuar",
        plan:"Planeemos nuestra cita ❤️",
        date:"Elige una fecha",
        place:"Elige un lugar",
        cuisine:"Tu cocina favorita",
        confirm:"Confirmar",
        thanks:"Gracias ❤️",
        share:"Compartir con amigos",
        dateError:"Por favor, selecciona una fecha futura",
        selectLocation:"Haz clic en el mapa para seleccionar una ubicación",
        locationSelected:"Ubicación: ",
        italian:"Italiana",
        japanese:"Japonesa",
        spanish:"Española",
        mexican:"Mexicana",
        french:"Francesa"
    },

    ru:{
        question:"Ты пойдёшь со мной на свидание?",
        yes:"ДА",
        no:"НЕТ",
        accepted:"Подожди... Ты правда сказала ДА?!",
        continue:"Продолжить",
        plan:"Давай спланируем свидание ❤️",
        date:"Выберите дату",
        place:"Выберите место",
        cuisine:"Любимая кухня",
        confirm:"Подтвердить",
        thanks:"Спасибо ❤️",
        share:"Поделиться с друзьями",
        dateError:"Пожалуйста, выберите будущую дату",
        selectLocation:"Щелкните на карте, чтобы выбрать место",
        locationSelected:"Место: ",
        italian:"Итальянская",
        japanese:"Японская",
        spanish:"Испанская",
        mexican:"Мексиканская",
        french:"Французская"
    }

};

const langSelect = document.getElementById("lang");
let currentLang = "en";

function updateLanguage(lang){

    currentLang = lang;
    const t = translations[lang];

    document.getElementById("question").textContent=t.question;
    document.getElementById("yesBtn").textContent=t.yes;
    document.getElementById("noBtn").textContent=t.no;
    document.getElementById("acceptedText").textContent=t.accepted;
    document.getElementById("continueBtn").textContent=t.continue;
    document.getElementById("formTitle").textContent=t.plan;
    document.getElementById("dateLabel").textContent=t.date;
    document.getElementById("placeLabel").textContent=t.place;
    document.getElementById("cuisineLabel").textContent=t.cuisine;
    document.getElementById("submitBtn").textContent=t.confirm;
    document.getElementById("thanksText").textContent=t.thanks;
    document.getElementById("shareBtn").textContent=t.share;
    document.getElementById("mapInfo").textContent=t.selectLocation;
}

langSelect.addEventListener("change",(e)=>{
    updateLanguage(e.target.value);
});

updateLanguage("en");

// Date picker setup
const today = new Date();
const dateInput = document.getElementById("dateInput");

flatpickr(dateInput, {
    minDate: today,
    dateFormat: "Y-m-d",
    defaultDate: today
});

dateInput.addEventListener("change", function() {
    const selectedDate = new Date(this.value);
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    
    if (selectedDate < today) {
        document.getElementById("dateError").textContent = translations[currentLang].dateError;
        this.value = "";
    } else {
        document.getElementById("dateError").textContent = "";
    }
});

// Leaflet Map setup
let map;
let marker;
let selectedLat = 48.8566;
let selectedLng = 2.3522;
let selectedPlace = "Paris, France";
let mapInitialized = false;

function initMap() {
    if (mapInitialized) return;
    mapInitialized = true;
    
    const europeCenter = [48.8566, 2.3522];
    
    map = L.map("map").setView(europeCenter, 4);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: "© OpenStreetMap contributors",
        maxZoom: 19,
        minZoom: 2
    }).addTo(map);

    // Add click listener to map
    map.on("click", (e) => {
        placeMarker(e.latlng.lat, e.latlng.lng);
    });

    // Add initial marker
    placeMarker(selectedLat, selectedLng);
}

function placeMarker(lat, lng) {
    selectedLat = lat;
    selectedLng = lng;

    if (marker) {
        map.removeLayer(marker);
    }

    marker = L.marker([lat, lng], {
        title: "Meeting point"
    }).addTo(map)
    .bindPopup("📍 Meeting Point")
    .openPopup();

    // Get place name from coordinates using Nominatim (free reverse geocoding)
    fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`)
        .then(response => response.json())
        .then(data => {
            if (data.address) {
                const city = data.address.city || data.address.town || data.address.village || "";
                const country = data.address.country || "";
                selectedPlace = city && country ? `${city}, ${country}` : country || "Selected Location";
            } else {
                selectedPlace = `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
            }
            document.getElementById("placeName").value = selectedPlace;
            document.getElementById("mapInfo").textContent = 
                translations[currentLang].locationSelected + selectedPlace;
        })
        .catch(() => {
            selectedPlace = `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
            document.getElementById("placeName").value = selectedPlace;
            document.getElementById("mapInfo").textContent = 
                translations[currentLang].locationSelected + selectedPlace;
        });

    document.getElementById("latitude").value = selectedLat;
    document.getElementById("longitude").value = selectedLng;
}

const yesBtn=document.getElementById("yesBtn");
const noBtn=document.getElementById("noBtn");

let yesScale=1;
let noScale=1;

function moveNoButton(){

    const maxX=window.innerWidth-150;
    const maxY=window.innerHeight-100;

    const x=Math.random()*maxX;
    const y=Math.random()*maxY;

    noBtn.style.position="fixed";
    noBtn.style.left=x+"px";
    noBtn.style.top=y+"px";

    yesScale+=0.12;
    noScale-=0.10;

    yesBtn.style.transform=`scale(${yesScale})`;

    noBtn.style.transform=
        `scale(${Math.max(noScale,0.3)})`;
}

noBtn.addEventListener("mouseover",moveNoButton);
noBtn.addEventListener("click",moveNoButton);

function showScreen(id){

    document
      .querySelectorAll(".screen")
      .forEach(s=>s.classList.remove("active"));

    document
      .getElementById(id)
      .classList.add("active");

    // Initialize map when screen 3 is shown
    if (id === "screen3") {
        setTimeout(() => {
            if (!mapInitialized) {
                initMap();
            } else if (map) {
                map.invalidateSize();
                map.setView([selectedLat, selectedLng], 4);
            }
        }, 100);
    }
}

function launchConfetti(){

    for(let i=0;i<150;i++){

        const confetti=document.createElement("div");

        confetti.className="confetti";

        confetti.style.left=
            Math.random()*window.innerWidth+"px";

        confetti.style.background=
            `hsl(${Math.random()*360},100%,50%)`;

        confetti.style.animationDuration=
            (Math.random()*2+2)+"s";

        document.body.appendChild(confetti);

        setTimeout(()=>{
            confetti.remove();
        },4000);
    }
}

yesBtn.addEventListener("click",()=>{

    showScreen("screen2");
    launchConfetti();

});

document
.getElementById("continueBtn")
.addEventListener("click",()=>{

    showScreen("screen3");

});

document
.getElementById("submitBtn")
.addEventListener("click",()=>{

    const dateValue = document.getElementById("dateInput").value;
    
    if (!dateValue) {
        document.getElementById("dateError").textContent = translations[currentLang].dateError;
        return;
    }

    showScreen("screen4");

});

const referral =
Math.random()
.toString(36)
.substring(2,8);

function generateShareUrl() {
    const date = document.getElementById("dateInput").value;
    const lat = document.getElementById("latitude").value;
    const lng = document.getElementById("longitude").value;
    const cuisine = document.getElementById("cuisineSelect").value;
    
    const params = new URLSearchParams({
        from: referral,
        date: date,
        lat: lat,
        lng: lng,
        cuisine: cuisine
    });

    return location.origin + location.pathname + "?" + params.toString();
}

document
.getElementById("shareLink")
.textContent="";

document
.getElementById("shareBtn")
.addEventListener("click",async()=>{

    const shareUrl = generateShareUrl();

    if(navigator.share){

        try{
            await navigator.share({
                title:"Date Invitation",
                text:"Try this 😄",
                url:shareUrl
            });
        }catch(e){}
    }
    else{

        navigator.clipboard.writeText(shareUrl);
        alert("Link copied!");
    }

});

// Handle URL parameters if user is visiting from a share link
window.addEventListener("load", () => {
    const params = new URLSearchParams(window.location.search);
    
    if (params.has("date") && params.has("lat") && params.has("lng")) {
        const date = params.get("date");
        const lat = parseFloat(params.get("lat"));
        const lng = parseFloat(params.get("lng"));
        const cuisine = params.get("cuisine");
        
        document.getElementById("dateInput").value = date;
        document.getElementById("latitude").value = lat;
        document.getElementById("longitude").value = lng;
        
        if (cuisine) {
            document.getElementById("cuisineSelect").value = cuisine;
        }
    }
});

document
.getElementById("shareLink")
.addEventListener("click", async () => {
    const shareUrl = generateShareUrl();
    navigator.clipboard.writeText(shareUrl);
    alert("Link copied!");
});

// Update share link when form changes
document.getElementById("submitBtn").addEventListener("click", () => {
    setTimeout(() => {
        const shareUrl = generateShareUrl();
        document.getElementById("shareLink").textContent = shareUrl;
        document.getElementById("shareLink").style.cursor = "pointer";
        document.getElementById("shareLink").title = "Click to copy";
    }, 100);
});

</script>

</body>
</html>
